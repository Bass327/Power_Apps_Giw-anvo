<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Connexion GIW'ANVO…</title>
  <style>
    body { background: #080f0b; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    p { color: #7a9e87; font-family: sans-serif; font-size: 14px; }
  </style>
  <script src="/MicrosoftTeams.min.js"></script>
</head>
<body>
  <p id="status">Finalisation de la connexion…</p>
  <script>
    // Initialise le SDK Teams immédiatement au chargement de la page.
    // Sur Teams mobile, app.initialize() doit être résolu avant notifySuccess/Failure,
    // sinon la popup ne se ferme pas automatiquement (le SDK n'a pas encore de canal
    // de communication avec l'app parente).
    // Timeout de 3 s : hors Teams, initialize() ne reçoit jamais de réponse.
    const _sdkReady = typeof microsoftTeams !== 'undefined'
      ? Promise.race([
          microsoftTeams.app.initialize().catch(() => {}),
          new Promise(r => setTimeout(r, 3000))
        ])
      : Promise.resolve()

    ;(async function () {
      const KEY_RESULT = 'giwanvo_pkce_result'
      const KEY_ERROR  = 'giwanvo_pkce_error'
      const KEY_PKCE   = 'giwanvo_pkce_'

      // Ferme la popup dans tous les cas.
      // Attend d'abord que le SDK soit prêt (requis sur Teams mobile),
      // puis appelle notifySuccess/Failure, puis window.close() en secours.
      const finish = async (success, payload) => {
        await _sdkReady
        if (typeof microsoftTeams !== 'undefined') {
          try {
            if (success) microsoftTeams.authentication.notifySuccess(payload)
            else         microsoftTeams.authentication.notifyFailure(payload)
          } catch (_) {}
        }
        // Fermeture de secours dans 1.5 s si Teams ne ferme pas la popup
        setTimeout(() => { try { window.close() } catch (_) {} }, 1500)
      }

      // ── Paramètres OAuth ────────────────────────────────────────────────
      const params = new URLSearchParams(window.location.search)
      const code   = params.get('code')
      const state  = params.get('state')
      const error  = params.get('error')

      if (error) {
        const msg = error + ': ' + (params.get('error_description') || '')
        localStorage.setItem(KEY_ERROR, msg)
        await finish(false, msg)
        return
      }

      // ── Vérification anti-CSRF (localStorage partagé avec auth-start) ───
      const savedState   = localStorage.getItem(KEY_PKCE + 'state')
      const codeVerifier = localStorage.getItem(KEY_PKCE + 'verifier')
      const clientId     = localStorage.getItem(KEY_PKCE + 'client_id')
      const tenantId     = localStorage.getItem(KEY_PKCE + 'tenant_id')

      // Nettoyage immédiat — données PKCE à usage unique
      localStorage.removeItem(KEY_PKCE + 'state')
      localStorage.removeItem(KEY_PKCE + 'verifier')
      localStorage.removeItem(KEY_PKCE + 'client_id')
      localStorage.removeItem(KEY_PKCE + 'tenant_id')

      if (!savedState || state !== savedState) {
        document.getElementById('status').textContent = 'Erreur : state_mismatch'
        const errMsg = 'state_mismatch'
        localStorage.setItem(KEY_ERROR, errMsg)
        await finish(false, errMsg)
        return
      }

      // ── Échange code → access token (PKCE) ─────────────────────────────
      try {
        const resp = await fetch(
          'https://login.microsoftonline.com/' + tenantId + '/oauth2/v2.0/token',
          {
            method:  'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({
              client_id:     clientId,
              code:          code,
              redirect_uri:  window.location.origin + '/auth-end.html',
              grant_type:    'authorization_code',
              code_verifier: codeVerifier,
            }),
          }
        )
        const data = await resp.json()

        if (data.access_token) {
          const payload = JSON.stringify({
            accessToken:  data.access_token,
            expiresIn:    data.expires_in ?? 3600,
            refreshToken: data.refresh_token ?? null,
            clientId:     clientId,
            tenantId:     tenantId,
          })
          // Stocke dans localStorage AVANT d'appeler finish() :
          // la fenêtre principale lit le résultat via polling ou storage event
          // même si notifySuccess est lent sur certains contextes Teams.
          localStorage.setItem(KEY_RESULT, payload)
          await finish(true, payload)
        } else {
          const errMsg = (data.error || 'no_access_token') + ': ' + (data.error_description || '')
          document.getElementById('status').textContent = 'Erreur : ' + errMsg
          localStorage.setItem(KEY_ERROR, errMsg)
          await finish(false, errMsg)
        }
      } catch (err) {
        const errMsg = 'fetch_failed: ' + err.message
        document.getElementById('status').textContent = 'Erreur : ' + errMsg
        localStorage.setItem(KEY_ERROR, errMsg)
        await finish(false, errMsg)
      }
    })()
  </script>
</body>
</html>
